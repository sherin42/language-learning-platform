<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Lessons | LangLearn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* =========================
BODY
========================= */

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%);
min-height:100vh;
color:#fff;
}

/* =========================
NAV
========================= */

.top-nav{
background:rgba(15,32,39,0.95);
padding:1rem 0;
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
max-width:1400px;
margin:auto;
padding:0 2rem;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
font-size:1.8rem;
font-weight:800;
}

.back-link{
color:white;
text-decoration:none;
border:2px solid rgba(255,255,255,0.3);
padding:0.4rem 1.2rem;
border-radius:20px;
transition:0.2s;
}

.back-link:hover{
background:white;
color:#0f2027;
}

/* =========================
PAGE
========================= */

.container{
max-width:1400px;
margin:auto;
padding:2rem;
}

.page-header{
background:white;
color:#0f2027;
padding:2rem;
border-radius:20px;
margin-bottom:2rem;
}

/* =========================
FILTERS
========================= */

.filters{
display:flex;
gap:1rem;
flex-wrap:wrap;
justify-content:center;
margin-bottom:2rem;
}

.filter-btn{
padding:0.6rem 1.6rem;
border-radius:20px;
border:none;
font-weight:700;
cursor:pointer;
background:rgba(255,255,255,0.9);
}

.filter-btn.active{
background:#00d4ff;
color:white;
}

/* =========================
CATEGORY
========================= */

.category-section{
margin-bottom:50px;
}

.category-section h3{
margin:20px 0;
font-weight:700;
}

/* =========================
LESSON GRID
========================= */

.lesson-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
}

/* =========================
LESSON CARD
========================= */

.lesson-card-small{
background:white;
color:#0f2027;
border-radius:16px;
padding:18px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.25s;
}

.lesson-card-small:hover{
transform:translateY(-5px);
box-shadow:0 12px 30px rgba(0,0,0,0.3);
}

.lesson-card-small h4{
font-size:18px;
font-weight:700;
margin-bottom:5px;
}

.lesson-card-small p{
font-size:14px;
color:#555;
margin-bottom:8px;
}

.lesson-card-small strong{
font-size:14px;
}

/* locked card */

.lesson-card-small.locked{
opacity:0.5;
cursor:not-allowed;
}

/* Show more / Show less buttons */

.show-more-btn {
  margin-top: 10px;
  background: none;
  border: none;
  color: #00e676;
  font-weight: 600;
  cursor: pointer;
}

.show-more-btn:hover {
  text-decoration: underline;
  color: #00c853;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:768px){

.lesson-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<!-- NAV -->

<nav class="top-nav">
<div class="nav-container">

<div class="brand">LangLearn</div>

<a href="dashboard.html" class="back-link">
⬅ Dashboard
</a>

</div>
</nav>

<!-- CONTENT -->

<div class="container">

<!-- HEADER -->

<div class="page-header">
<h2>📚 All Lessons</h2>
<p>Browse all available lessons by category</p>
</div>

<!-- FILTERS -->

<div class="filters">

<button class="filter-btn active" data-cat="All">
All
</button>

<button class="filter-btn" data-cat="Beginner">
Beginner
</button>

<button class="filter-btn" data-cat="Intermediate">
Intermediate
</button>

<button class="filter-btn" data-cat="Advanced">
Advanced
</button>

</div>

<!-- LESSONS -->

<div id="lessonsContainer"></div>

</div>

<!-- SCRIPTS -->

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/all_lessons.js"></script>

</body>
</html>
