<!DOCTYPE html>
<html>
<head>
  <title>Select Language</title>

</head>
<body class="bg-dark text-white d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 text-dark" style="width:350px;">
  <h4 class="mb-3">🌍 Choose Your Language</h4>

  <select id="languageSelect" class="form-control mb-3">

  <button id="saveLanguageBtn" class="btn btn-primary w-100">

  </button>
</div>

<script type="module" src="js/select-language.js"></script>
</body>
</html>
