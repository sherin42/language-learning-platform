<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  color:white;
  padding:40px;
}

.quiz-card{
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

#quizModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}

#quizBox{
  background:white;
  color:black;
  width:95%;
  max-width:600px;
  padding:25px;
  border-radius:15px;
  max-height:90vh;
  overflow:auto;
  position:relative;
}

.close-btn{
  position:absolute;
  right:15px;
  top:10px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="mb-3">
  <button id="backToLessonsBtn" class="btn btn-secondary">
    ⬅ Back to Lessons
  </button>
</div>

<h3 id="lessonTitle"></h3>

<button id="addQuizBtn" class="btn btn-success mb-3">
  + Add Question
</button>

<hr>

<div id="quizList"></div>

<!-- =========================
     MODAL
========================= -->
<div id="quizModal">
  <div id="quizBox">
    <span class="close-btn" id="closeModal">✖</span>

    <h5 id="formTitle">Add Question</h5>

    <div class="mb-3">
      <label>Question</label>
      <input id="questionInput" class="form-control">
    </div>

    <div id="optionsContainer"></div>

    <div class="mb-3">
      <label>Correct Option</label>
      <select id="correctSelect" class="form-control">
        <option value="">Select correct option</option>
        <option value="0">Option 1</option>
        <option value="1">Option 2</option>
        <option value="2">Option 3</option>
        <option value="3">Option 4</option>
      </select>
    </div>

    <button id="saveQuestionBtn" class="btn btn-warning w-100">
      Save
    </button>

  </div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/admin-quiz.js"></script>

</body>
</html>
