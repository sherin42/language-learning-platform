<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Users | LangLearn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #fff;
}

/* NAVBAR */
.top-nav {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.2);
  padding: 1rem 0;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav-container {
  max-width: 1200px;
  margin: auto;
  padding: 0 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  font-size: 1.6rem;
  font-weight: 800;
}

.admin-badge {
  background: linear-gradient(135deg,#ffc107,#ff9800);
  padding: .4rem 1rem;
  border-radius: 20px;
  font-weight: 700;
  margin-left: 10px;
}

.back-link {
  background: rgba(255, 255, 255, 0.2);
  border: 2px solid rgba(255, 255, 255, 0.3);
  color: white;
  padding: 0.4rem 1.2rem;
  border-radius: 25px;
  font-weight: 600;
  text-decoration: none;
  transition: 0.3s;
  cursor: pointer;
}

.back-link:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateX(-4px);
}

/* MAIN */
.main {
  max-width: 1200px;
  margin: auto;
  padding: 30px 20px;
}

/* TABLE CARD */
.table-card {
  background: #fff;
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,.3);
  color: #333;
}

/* TABLE */
table {
  width: 100%;
}

th {
  background: #f4f4f4;
  font-weight: 600;
}

td, th {
  padding: 12px;
}

tr:not(:last-child) {
  border-bottom: 1px solid #ddd;
}

/* BUTTON */
#addUserBtn {
  margin-bottom: 15px;
  width: 150px;
  height: 40px;
  background: #203a43;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 25px;
  font-weight: 600;
  transition: 0.3s;
}

#addUserBtn:hover {
  background: #1a3037;
  transform: translateX(-3px);
}

/* MODALS */
#editOverlay,
#viewOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.modal-box {
  background: #fff;
  width: 90%;
  max-width: 500px;
  padding: 25px;
  border-radius: 20px;
  color: #333;
  position: relative;
  animation: fadeIn .3s ease;
}

@keyframes fadeIn {
  from {transform: scale(.9); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 20px;
  cursor: pointer;
  font-weight: bold;
}

.modal-box label {
  margin-top: 10px;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="top-nav">
  <div class="nav-container">
    <div>
      <span class="brand">LangLearn</span>
      <span class="admin-badge">ADMIN</span>
    </div>

    <a href="admin.html" class="back-link">⬅ Back</a>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">👥 Manage Users</h2>

    <button id="addUserBtn" class="btn btn-primary btn-sm">
      + Add User
    </button>
  </div>

  <div class="table-card mt-3">
    <div class="table-responsive">
      <table id="usersTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th width="180">Actions</th>
          </tr>
        </thead>
        <tbody id="usersContainer"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- VIEW MODAL -->
<div id="viewOverlay">
  <div class="modal-box">
    <span class="close-btn" id="closeViewBtn">✖</span>

    <!-- ✅ FIXED HERE -->
    <h4 id="viewTitle">User Details</h4>

    <div id="viewContent"></div>
  </div>
</div>

<!-- ADD / CREATE USER MODAL -->
<!-- EDIT MODAL -->
<div id="editOverlay">
  <div class="modal-box">
    <span class="close-btn" id="closeEditBtn">✖</span>
    <h4 id="modalTitle">Edit User</h4>

    <label>Name</label>
    <input type="text" id="editName" class="form-control">

    <label>Email</label>
    <input type="email" id="editEmail" class="form-control">

    <!-- ✅ ADDED PASSWORD FIELD -->
    <label>Password</label>
    <input type="password" id="editPassword" class="form-control">

    <label>Role</label>
    <select id="editRole" class="form-control">
      <option value="user">user</option>
      <option value="admin">admin</option>
    </select>

    <label class="mt-2">Selected Language</label>
    <select id="editSelectedLanguage" class="form-control">
      <option>Loading...</option>
    </select>

    <div class="d-flex gap-2 mt-3">
      <button id="saveUserBtn" class="btn btn-warning flex-fill">Save</button>
      <button id="cancelUserBtn" class="btn btn-secondary flex-fill">Cancel</button>
    </div>
  </div>
</div>

<!-- ✅ Added defer -->
<script type="module" src="js/firebase.js" defer></script>
<script type="module" src="js/manage_user.js" defer></script>

</body>
</html>
