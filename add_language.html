<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Language | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: system-ui;
    }

    /* NAV */
.top-nav {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
    }

.admin-badge {
  background: linear-gradient(135deg,#ffc107,#ff9800);
  padding: .4rem 1rem;
  border-radius: 20px;
  font-weight: 700;
}

.back-link {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 0.5rem 1.5rem;
      border-radius: 25px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: 0.3s;
      cursor: pointer; /* ✅ FIX */
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(-5px);
      color: white;
    }

    /* Center content properly */
    .main-container {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,.3);
    }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="nav-container">
      <div>
      <span class="brand">LangLearn</span>
      <span class="admin-badge ms-2">ADMIN</span>
    </div>
      <a href="admin.html" class="back-link">
        ⬅ Back
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-container">
    <div class="card">
      <h4 class="mb-3">➕ Add Language</h4>

      <form id="languageForm">
        <div class="mb-3">
          <label class="form-label">Language Name</label>
          <input type="text" id="langName" class="form-control" placeholder="English" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Language Code</label>
          <input type="text" id="langCode" class="form-control" placeholder="en" required />
          <small class="text-muted">Use ISO code (en, fr, es, de)</small>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="langActive" checked />
          <label class="form-check-label">Active</label>
        </div>

        <button class="btn btn-primary w-100">
          Add Language
        </button>
      </form>

      <p id="msg" class="mt-3 text-success fw-semibold" style="display:none;"></p>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/add_language.js"></script>

</body>
</html>
