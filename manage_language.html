<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Languages | LangLearn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
}

/* NAV */
.top-nav {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
    }

.admin-badge {
  background: linear-gradient(135deg,#ffc107,#ff9800);
  padding: .4rem 1rem;
  border-radius: 20px;
  font-weight: 700;
}

.back-link {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 0.5rem 1.5rem;
      border-radius: 25px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: 0.3s;
      cursor: pointer; /* ✅ FIX */
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(-5px);
      color: white;
    }

/* Sidebar spacing (if using dashboard layout) */
.main{
  padding:30px;
}

.back-link {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    color: white;
    padding: 0.5rem 1.3rem;
    border-radius: 30px;
    font-weight: 600;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.back-link:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateX(-4px);
    color: white;
}

/* Card Grid */
.language-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.language-card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.language-actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

/* Modal */
#editOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

#editBox{
  background:#fff;
  width:90%;
  max-width:500px;
  padding:25px;
  border-radius:20px;
}
</style>
</head>

<body>

<nav class="top-nav">
  <div class="nav-container">
    <div>
      <span class="brand">LangLearn</span>
      <span class="admin-badge ms-2">ADMIN</span>
    </div>
    <a href="admin.html" class="back-link">⬅ Back</a>
  </div>
</nav>

<div class="main">

  <!-- Header Row -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="text-white m-0">🌍 Manage Languages</h2>

  
</div>

<div id="languagesContainer" class="language-grid"></div>
</div>

<!-- EDIT MODAL -->
<div id="editOverlay">
  <div id="editBox">
    <h4>Edit Language</h4>

    <label>Name</label>
    <input id="editName" class="form-control mb-2">

    <label>Code</label>
    <input id="editCode" class="form-control mb-2">

    <div class="form-check mb-3">
      <input type="checkbox" id="editActive" class="form-check-input">
      <label class="form-check-label">Active</label>
    </div>

    <div class="d-flex gap-2">
      <button id="saveEditBtn" class="btn btn-warning flex-fill">Save</button>
      <button id="cancelEditBtn" class="btn btn-secondary flex-fill">Cancel</button>
    </div>

  </div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/manage_language.js"></script>

</body>
</html>
