<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Progress | LangLearn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
}

/* NAV */
.top-nav {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding: 1rem 0;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav-container {
  max-width: 1200px;
  margin: auto;
  padding: 0 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand {
  font-size:1.8rem;
  font-weight:800;
}

.admin-badge {
  background: linear-gradient(135deg,#ffc107,#ff9800);
  padding:.4rem 1rem;
  border-radius:20px;
  font-weight:700;
  color:#000;
}

/* BACK BUTTON */
.back-link {
  background: rgba(255,255,255,0.2);
  border:2px solid rgba(255,255,255,0.3);
  color:white;
  padding:0.5rem 1.4rem;
  border-radius:25px;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}

.back-link:hover {
  background: rgba(255,255,255,0.3);
  transform: translateX(-5px);
  color:white;
}

/* MAIN CONTAINER */
.container-box{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

/* CARD */
.card{
  border-radius:12px;
  border:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

/* PROGRESS */
.progress{
  height:25px;
  border-radius:10px;
}

/* TABLE */
.table{
  border-radius:12px;
  overflow:hidden;
}

.table th{
  background:#f4f4f4;
  font-weight:600;
}

.table td{
  vertical-align:middle;
}

/* EMPTY */
.empty-row{
  text-align:center;
  padding:20px;
  color:#777;
}

/* HEADINGS */
h2{
  font-weight:700;
}

h4{
  font-weight:600;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="top-nav">
  <div class="nav-container">
    <div>
      <span class="brand">LangLearn</span>
      <span class="admin-badge ms-2">ADMIN</span>
    </div>
    <a href="manage_progress.html" class="back-link">⬅ Back</a>
  </div>
</nav>

<!-- MAIN -->
<div class="container-box">

  <!-- USER TITLE -->
  <h2 id="userName">Loading...</h2>

  <!-- PROGRESS CARD -->
  <div class="card mt-4 p-4 text-dark">

    <h5 class="mb-3">Progress Overview</h5>

    <div class="progress">
      <div id="progressBar"
        class="progress-bar bg-success"
        role="progressbar"
        style="width:0%">
      </div>
    </div>

    <p class="mt-3 mb-0 fw-semibold">
      <span id="progressText">Loading...</span>
    </p>

  </div>

  <!-- LESSONS -->
  <div class="mt-5">

    <h4 class="mb-3">Lessons</h4>

    <div class="table-responsive">

      <table class="table table-bordered bg-white text-dark">

        <thead>
          <tr>
            <th>Lesson</th>
            <th>Status</th>
            <th>Best Score</th>
            <th>Completed At</th>
          </tr>
        </thead>

        <tbody id="lessonList">
          <tr>
            <td colspan="4" class="empty-row">Loading lessons...</td>
          </tr>
        </tbody>

      </table>

    </div>

  </div>

</div>

<script type="module" src="js/progress_view.js"></script>

</body>
</html>
