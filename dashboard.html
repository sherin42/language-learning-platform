<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | LangLearn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 50%;
            top: -250px;
            right: -250px;
            animation: float 20s infinite ease-in-out;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: rgba(0, 212, 255, 0.08);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            animation: float 15s infinite ease-in-out reverse;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-30px) translateX(30px); }
        }

        /* Top Navigation Bar */
        .top-nav {
            background: rgba(1, 3, 28, 0.418);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .nav-right {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: white;
            font-weight: 600;
        }

        .nav-logout-btn {
            background: rgba(255, 77, 77, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-logout-btn:hover {
            background: rgba(255, 77, 77, 1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.4);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
        }

        /* Dashboard Container */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Welcome Section */
        .welcome-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #welcomeUser {
            font-size: 2.5rem;
            font-weight: 800;
            color: #0f2027;
            margin-bottom: 0.5rem;
        }

        .welcome-subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        

        /* Progress Section */
        .progress-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .progress-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f2027;
        }

        #progressText {
            color: #00d4ff;
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0;
        }

        .progress-bar {
            height: 20px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        #progressFill {
            height: 100%;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border-radius: 10px;
            transition: width 1s ease;
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.4);
            position: relative;
        }

        #progressFill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Lessons Section */
        .lessons-section {
            animation: fadeInUp 0.6s ease 0.6s both;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .view-all-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .view-all-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(5px);
            color: white;
        }

        .lessons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .lesson-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .lesson-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .filters {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.8);
            cursor: pointer;
            font-weight: 600;
        }

        .filter-btn.active {
            background: #00d4ff;
            color: white;
        }


        /* Logout Button - Hidden */
        .logout-btn {
            display: none;
        }

        #lessonsContainer {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

.category-column {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.category-title {
  color: white;
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 10px;
}


        /* CATEGORY GRID LAYOUT */
.category-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}



/* Lesson card stacked vertically */
.category-column .lesson-card {
  width: 100%;
}

/* Responsive */
@media (max-width: 900px) {
  .category-grid {
    grid-template-columns: 1fr;
  }
}


        /* Responsive */
        @media (max-width: 768px) {
            .dashboard {
                padding: 1rem;
            }
            .nav-container {
                padding: 0 1rem;
            }
            #welcomeUser {
                font-size: 2rem;
            }
            .lessons {
                grid-template-columns: 1fr;
            }
            .logout-btn {
                bottom: 1rem;
                right: 1rem;
            }
        }
</style>

</head>

<body>

<!-- Top Navigation -->
<nav class="top-nav">
<div class="nav-container">

<div class="brand">LangLearn</div>

<div class="nav-right">

<div class="user-profile">
<div class="user-avatar" id="userInitial">U</div>
<span id="userName">User</span>
</div>

<select id="changeLanguage" class="form-control" style="width:160px;"></select>

<button id="logoutBtn" class="nav-logout-btn">Logout</button>

</div>
</div>
</nav>

<div class="dashboard">

<div class="welcome-section">
<h2 id="welcomeUser">Welcome 👋</h2>
<p class="welcome-subtitle">Ready to continue your language learning journey?</p>
</div>

<div class="progress-box">
<div class="progress-header">
<h3 class="progress-title">Overall Progress</h3>
<p id="progressText">Loading progress...</p>
</div>

<div class="progress-bar">
<div id="progressFill" style="width:0%"></div>
</div>
</div>

<div class="lessons-section">

<div class="section-header">
<h3 class="section-title">Your Lessons</h3>
<a href="all_lessons.html" class="view-all-btn">View All →</a>
</div>

<div id="lessonsContainer" class="category-grid"></div>

</div>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/dashboard.js"></script>

</body>
</html>
